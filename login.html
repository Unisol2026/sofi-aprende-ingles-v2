<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia learns English — Entrar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%23E8659A'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,#fff0f8 0%,#f3f0ff 48%,#eafaff 100%);
    background-attachment:fixed;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:#fff;
    border-radius:32px;
    border:3px solid #FFD9EC;
    box-shadow:0 8px 40px rgba(255,150,200,.22);
    padding:48px 40px 40px;
    width:100%;
    max-width:400px;
    text-align:center;
  }
  .mascot{
    font-size:72px;
    line-height:1;
    margin-bottom:8px;
    display:block;
  }
  .mascot-img{
    width:128px;
    height:128px;
    object-fit:cover;
    object-position:50% 38%;
    border-radius:50%;
    margin:0 auto 10px;
    display:block;
    background:#fff6fc;
    border:4px solid #FFD9EC;
    box-shadow:0 6px 18px rgba(255,150,200,.3);
  }
  .title{
    font-family:'Fredoka One',cursive;
    font-size:2rem;
    color:#FF6FB0;
    margin-bottom:4px;
  }
  .subtitle{
    font-size:.95rem;
    color:#9B6BE0;
    margin-bottom:32px;
    font-weight:700;
  }
  .field{
    margin-bottom:16px;
    text-align:left;
  }
  .field label{
    display:block;
    font-weight:800;
    color:#5A4A66;
    font-size:.85rem;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  .field input{
    width:100%;
    padding:14px 18px;
    border:2.5px solid #FFD9EC;
    border-radius:16px;
    font-family:'Nunito',sans-serif;
    font-size:1rem;
    font-weight:700;
    color:#5A4A66;
    outline:none;
    transition:border-color .2s;
    background:#fff8fc;
  }
  .field input:focus{
    border-color:#FF6FB0;
    background:#fff;
  }
  .btn{
    width:100%;
    padding:16px;
    background:linear-gradient(135deg,#FF6FB0,#9B6BE0);
    color:#fff;
    border:none;
    border-radius:20px;
    font-family:'Fredoka One',cursive;
    font-size:1.3rem;
    cursor:pointer;
    margin-top:8px;
    transition:transform .15s, box-shadow .15s;
    box-shadow:0 4px 20px rgba(155,107,224,.35);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(155,107,224,.45);}
  .btn:active{transform:translateY(0);}
  .error{
    display:none;
    margin-top:16px;
    padding:12px 16px;
    background:#fff0f0;
    border:2px solid #ffb3c1;
    border-radius:14px;
    color:#d63a6a;
    font-weight:700;
    font-size:.9rem;
  }
  .counter{
    margin-top:24px;
    padding:12px 16px;
    background:#f3f0ff;
    border-radius:14px;
    color:#9B6BE0;
    font-size:.85rem;
    font-weight:700;
    display:none;
  }
</style>
</head>
<body>
<div class="card">
  <img class="mascot-img" src="Imagens/soso-face.png" alt="Soso">
  <div class="title">Sofia learns English</div>
  <div class="subtitle">Entre para acessar o app 🌟</div>

  <form id="loginForm">
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="username" autocomplete="username" placeholder="Digite seu nome" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button type="button" class="btn" id="loginBtn" onclick="doLogin()">✨ Entrar</button>
    <div class="error" id="errorMsg">❌ Usuário ou senha incorretos. Tente de novo!</div>
  </form>

  <div class="counter" id="counterBox"></div>
</div>

<script>
  // Credenciais permitidas
  const USERS = {
    "sofia":     "Sofia01",
    "laura":     "Laura02",
    "perola":    "Perola03",
    "nina":      "nina04",
    "melissa":   "melissa05",
    "lara":      "lara06",
    "benjamin":  "Benjamin06",
    "samuel":    "Samuel07",
    "thomas":    "Thomas08",
    "yasmin":    "Yasmin09",
    "helena":    "Helena10",
    "miguel":    "miguel11"
  };

  // Chave de sessão
  const SESSION_KEY = "sofi_auth";
  const COUNT_PREFIX = "sofi_access_";

  // Se já está logado, vai direto para o app
  if (sessionStorage.getItem(SESSION_KEY)) {
    window.location.replace("index.html");
  }

  function doLogin() {
    const user = document.getElementById("username").value.trim().toLowerCase();
    const pass = document.getElementById("password").value;
    const errorEl = document.getElementById("errorMsg");

    if (USERS[user] && USERS[user] === pass) {
      // Registrar sessão
      sessionStorage.setItem(SESSION_KEY, user);

      // Incrementar contador de acesso deste usuário
      const countKey = COUNT_PREFIX + user;
      const count = parseInt(localStorage.getItem(countKey) || "0") + 1;
      localStorage.setItem(countKey, count);

      // Registrar histórico (últimos 10 acessos)
      const histKey = COUNT_PREFIX + user + "_hist";
      const hist = JSON.parse(localStorage.getItem(histKey) || "[]");
      hist.unshift(new Date().toLocaleString("pt-BR"));
      if (hist.length > 10) hist.pop();
      localStorage.setItem(histKey, JSON.stringify(hist));

      // Mostrar contador brevemente antes de redirecionar
      const box = document.getElementById("counterBox");
      box.style.display = "block";
      box.textContent = `🎉 Bem-vinda! Esta é sua ${count}ª visita!`;

      setTimeout(() => {
        window.location.replace("index.html");
      }, 1200);
    } else {
      errorEl.style.display = "block";
      document.getElementById("password").value = "";
      document.getElementById("password").focus();
      // Vibração suave
      errorEl.animate([{transform:"translateX(-6px)"},{transform:"translateX(6px)"},{transform:"translateX(0)"}],
        {duration:300, iterations:2});
    }
  }

  document.getElementById("password").onkeydown = function(e) {
    if (e.key === "Enter") doLogin();
  };
  document.getElementById("username").onkeydown = function(e) {
    if (e.key === "Enter") document.getElementById("password").focus();
  };
</script>
</body>
</html>
